services:
  # Qdrant vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    networks:
      - rag-network

  # PostgreSQL database
  postgres:
    image: postgres:17-alpine
    container_name: rag-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragchatbot}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-raguser} -d ${POSTGRES_DB:-ragchatbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RAG Chatbot application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-chatbot
    depends_on:
      # qdrant:
      #   condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-gemma2-9b-it}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-rag_collection}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragchatbot}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - rag-network
    stdin_open: true
    tty: true
  appstreamlit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-chatbot-streamlit
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=${GROQ_MODEL:-gemma2-9b-it}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - QDRANT_COLLECTION_NAME=${QDRANT_COLLECTION_NAME:-rag_collection}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-raguser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=${POSTGRES_DB:-ragchatbot}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - API_BASE_URL=http://app:8000
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app_ws.py:/app/streamlit_app_ws.py
      - ./streamlit_app_enhanced.py:/app/streamlit_app_enhanced.py
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./streamlit_app_v2.py:/app/streamlit_app_v2.py
      - ./.streamlit:/app/.streamlit
    command: streamlit run streamlit_app_v2.py
    networks:
      - rag-network
    stdin_open: true
    tty: true
  # Optional: Jupyter notebook for development
  notebook:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-notebook
    command: jupyter notebook --ip=0.0.0.0 --no-browser --allow-root
    depends_on:
      - qdrant
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - JUPYTER_ENABLE_LAB=yes
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
    networks:
      - rag-network
    profiles:
      - development

networks:
  rag-network:
    driver: bridge

volumes:
  qdrant_data:
  postgres_data: